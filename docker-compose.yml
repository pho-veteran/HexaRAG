services:
  frontend:
    build: ./frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://backend:8000
    depends_on:
      - backend

  backend:
    build: ./backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./W4:/workspace/W4:ro
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://hexarag:hexarag@postgres:5432/hexarag
      MONITORING_BASE_URL: http://backend:8001
      W4_DATA_ROOT: /workspace/W4/data_package
    depends_on:
      - postgres

  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: hexarag
      POSTGRES_USER: hexarag
      POSTGRES_PASSWORD: hexarag
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
